<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TFT Designer — Overhead Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f0f0;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ─── Toolbar ──────────────────────────────────────── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: #fff;
    border-bottom: 1px solid #d0d0d0;
    flex-shrink: 0;
  }
  .tb-sep {
    width: 1px;
    height: 24px;
    background: #d0d0d0;
    margin: 0 4px;
  }
  .tb-btn {
    background: #f5f5f5;
    color: #333;
    border: 1px solid #c0c0c0;
    padding: 4px 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 4px;
  }
  .tb-btn:hover { background: #e0e0e0; }
  .tb-btn.active { background: #3b82f6; color: #fff; border-color: #2563eb; }
  .tb-select {
    background: #fff;
    color: #333;
    border: 1px solid #c0c0c0;
    padding: 4px 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    border-radius: 4px;
  }
  .tb-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    margin-right: 2px;
    font-weight: 600;
  }
  .tb-input {
    background: #fff;
    color: #333;
    border: 1px solid #c0c0c0;
    padding: 3px 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    width: 50px;
    text-align: center;
    border-radius: 4px;
  }

  /* ─── Workspace ────────────────────────────────────── */
  #workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Layers Panel ─────────────────────────────────── */
  #layers-panel {
    width: 190px;
    background: #fff;
    border-right: 1px solid #d0d0d0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    padding: 8px 10px 6px;
    border-bottom: 1px solid #e0e0e0;
    letter-spacing: 1px;
    font-weight: 600;
  }
  #layer-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .layer-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid transparent;
    border-radius: 3px;
    margin: 1px 4px;
  }
  .layer-item:hover { background: #f0f0f0; }
  .layer-item.selected { background: #e0edff; border-color: #3b82f6; }
  .layer-type {
    color: #888;
    font-size: 10px;
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .layer-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .layer-vis {
    color: #999;
    cursor: pointer;
    font-size: 10px;
    flex-shrink: 0;
  }
  .layer-vis:hover { color: #333; }
  .layer-vis.hidden { color: #ccc; }

  /* ─── Canvas Area ──────────────────────────────────── */
  #canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    background: #e8e8e8;
    position: relative;
  }
  #screen-wrap {
    position: relative;
    border: 2px solid #999;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    border-radius: 4px;
    flex-shrink: 0;
  }
  #screen-wrap.scanlines::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.12) 3px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    border-radius: 4px;
  }
  #tft, #overlay {
    position: absolute;
    top: 0; left: 0;
    image-rendering: pixelated;
  }
  #overlay { cursor: crosshair; }
  #canvas-info {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #999;
    pointer-events: none;
  }

  /* ─── Properties Panel ─────────────────────────────── */
  #props-panel {
    width: 250px;
    background: #fff;
    border-left: 1px solid #d0d0d0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .prop-section {
    padding: 8px 10px;
    border-bottom: 1px solid #e0e0e0;
  }
  .prop-section h3 {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 6px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .prop-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .prop-row label {
    width: 55px;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    flex-shrink: 0;
    font-weight: 500;
  }
  .prop-row input, .prop-row select {
    flex: 1;
    background: #fff;
    color: #333;
    border: 1px solid #c0c0c0;
    padding: 3px 5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    min-width: 0;
    border-radius: 3px;
  }
  .prop-row input[type=number] { width: 50px; }
  .prop-row input[type=checkbox] {
    flex: none;
    width: 14px;
    height: 14px;
    accent-color: #3b82f6;
  }
  .prop-row .half {
    display: flex;
    align-items: center;
    gap: 3px;
    flex: 1;
  }
  .prop-row .half label { width: auto; }
  .align-btns {
    display: flex;
    gap: 2px;
    flex: 1;
  }
  .align-btn {
    background: #f5f5f5;
    color: #666;
    border: 1px solid #c0c0c0;
    padding: 2px 8px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px;
    cursor: pointer;
    flex: 1;
    text-align: center;
    border-radius: 3px;
  }
  .align-btn:hover { color: #333; background: #e0e0e0; }
  .align-btn.active { background: #3b82f6; color: #fff; border-color: #2563eb; }

  /* ─── Color Palette ────────────────────────────────── */
  #palette {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    padding: 4px 0;
  }
  .swatch {
    width: 20px;
    height: 20px;
    border: 1px solid #bbb;
    cursor: pointer;
    border-radius: 3px;
  }
  .swatch:hover { border-color: #3b82f6; }
  .swatch.active { border: 2px solid #3b82f6; box-shadow: 0 0 0 1px #fff; }
  .color-target-btns {
    display: flex;
    gap: 2px;
    margin-bottom: 4px;
  }
  .ct-btn {
    background: #f5f5f5;
    color: #666;
    border: 1px solid #c0c0c0;
    padding: 2px 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 10px;
    cursor: pointer;
    flex: 1;
    text-align: center;
    border-radius: 3px;
  }
  .ct-btn:hover { color: #333; background: #e0e0e0; }
  .ct-btn.active { background: #3b82f6; color: #fff; border-color: #2563eb; }
  #custom-color-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  #custom-color-row input[type=color] {
    width: 28px;
    height: 22px;
    border: 1px solid #c0c0c0;
    background: #fff;
    cursor: pointer;
    padding: 0;
    border-radius: 3px;
  }
  #custom-color-row input[type=text] {
    flex: 1;
    background: #fff;
    color: #333;
    border: 1px solid #c0c0c0;
    padding: 3px 5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    border-radius: 3px;
  }

  /* ─── Empty state ──────────────────────────────────── */
  .empty-msg {
    color: #999;
    font-size: 12px;
    padding: 12px 10px;
    text-align: center;
    font-style: italic;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
</style>
</head>
<body>

<!-- ─── Toolbar ──────────────────────────────────────── -->
<div id="toolbar">
  <span class="tb-label">Display:</span>
  <select id="tb-preset" class="tb-select" onchange="onPresetChange()">
    <option value="480,320">480x320 (4.0" ST7796)</option>
    <option value="320,240">320x240 (2.8" ILI9341)</option>
    <option value="240,135">240x135 (1.14" ST7789)</option>
    <option value="128,64">128x64 (0.96" SSD1306)</option>
    <option value="320,170">320x170 (1.9" ST7789)</option>
    <option value="custom">Custom...</option>
  </select>
  <input type="number" id="tb-cw" class="tb-input" value="480" min="32" max="1024" style="display:none" onchange="onCustomRes()">
  <span id="tb-cx" style="display:none;font-size:12px;color:#666">x</span>
  <input type="number" id="tb-ch" class="tb-input" value="320" min="32" max="1024" style="display:none" onchange="onCustomRes()">

  <div class="tb-sep"></div>

  <button class="tb-btn" onclick="addElement('text')" title="Add Text (T)">+ TEXT</button>
  <button class="tb-btn" onclick="addElement('rect')" title="Add Rectangle (R)">+ RECT</button>
  <button class="tb-btn" onclick="addElement('line')" title="Add Line (L)">+ LINE</button>

  <div class="tb-sep"></div>

  <select id="tb-template" class="tb-select" onchange="loadTemplate(this.value)">
    <option value="">Templates...</option>
    <option value="flight">Flight Screen (480x320)</option>
    <option value="weather">Weather Screen (480x320)</option>
    <option value="blank">Blank Canvas</option>
  </select>

  <div class="tb-sep"></div>

  <button class="tb-btn" onclick="exportJSON()" title="Export layout as JSON">EXPORT</button>
  <button class="tb-btn" onclick="importJSON()" title="Import layout from JSON">IMPORT</button>
  <button class="tb-btn" onclick="exportCpp()" title="Export as C++ code">C++ CODE</button>

  <div class="tb-sep"></div>

  <button class="tb-btn" id="tb-grid" onclick="toggleGrid()" title="Toggle grid snap (G)">GRID</button>
  <select id="tb-grid-size" class="tb-select" onchange="onGridSizeChange()" title="Grid spacing">
    <option value="4">4 px</option>
    <option value="8" selected>8 px</option>
    <option value="10">10 px</option>
    <option value="16">16 px</option>
    <option value="20">20 px</option>
    <option value="32">32 px</option>
  </select>
  <button class="tb-btn active" id="tb-scan" onclick="toggleScanlines()" title="Toggle CRT scanlines">CRT</button>

  <div class="tb-sep"></div>

  <button class="tb-btn" onclick="doUndo()" title="Undo (Ctrl+Z)">UNDO</button>
  <button class="tb-btn" onclick="doRedo()" title="Redo (Ctrl+Y)">REDO</button>
</div>

<!-- ─── Workspace ────────────────────────────────────── -->
<div id="workspace">

  <!-- Layers -->
  <div id="layers-panel">
    <div class="panel-title">Elements</div>
    <div id="layer-list"></div>
  </div>

  <!-- Canvas -->
  <div id="canvas-area">
    <div id="screen-wrap" class="scanlines">
      <canvas id="tft"></canvas>
      <canvas id="overlay"></canvas>
    </div>
    <div id="canvas-info"></div>
  </div>

  <!-- Properties -->
  <div id="props-panel">
    <div class="panel-title">Properties</div>
    <div id="props-content">
      <div class="empty-msg">Select an element<br>or add one from the toolbar</div>
    </div>
  </div>

</div>

<!-- Hidden file inputs -->
<input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ─── Display Resolution ─────────────────────────────
let W = 480, H = 320;
const SCALE = 2;

// ─── Color Palette ──────────────────────────────────
const PALETTE = [
  { name: 'BG',       hex: '#080400' },
  { name: 'AMBER',    hex: '#FFA200' },
  { name: 'DIM',      hex: '#7B2800' },
  { name: 'DIMMER',   hex: '#392000' },
  { name: 'GREEN',    hex: '#00FF00' },
  { name: 'RED',      hex: '#FF0000' },
  { name: 'CYAN',     hex: '#00FFFF' },
  { name: 'YELLOW',   hex: '#FFFF00' },
  { name: 'ORANGE',   hex: '#FF8D00' },
  { name: 'GOLD',     hex: '#FFCE42' },
  { name: 'WHITE',    hex: '#FFFFFF' },
  { name: 'BLACK',    hex: '#000000' },
  { name: 'AL_RED',   hex: '#FF2222' },
  { name: 'AL_ROSE',  hex: '#FF4488' },
  { name: 'AL_ORANGE',hex: '#FF7700' },
  { name: 'AL_GOLD',  hex: '#FFD000' },
  { name: 'AL_GREEN', hex: '#22DD44' },
  { name: 'AL_TEAL',  hex: '#00CCBB' },
  { name: 'AL_SKY',   hex: '#44AAFF' },
  { name: 'AL_VIOLET',hex: '#AA66FF' },
];

// ─── Canvas Setup ───────────────────────────────────
const tftCanvas = document.getElementById('tft');
const ovCanvas  = document.getElementById('overlay');
const tftCtx    = tftCanvas.getContext('2d');
const ovCtx     = ovCanvas.getContext('2d');

function resizeCanvases() {
  tftCanvas.width  = W * SCALE;
  tftCanvas.height = H * SCALE;
  ovCanvas.width   = W * SCALE;
  ovCanvas.height  = H * SCALE;
  tftCanvas.style.width  = (W * SCALE) + 'px';
  tftCanvas.style.height = (H * SCALE) + 'px';
  ovCanvas.style.width   = (W * SCALE) + 'px';
  ovCanvas.style.height  = (H * SCALE) + 'px';
  const wrap = document.getElementById('screen-wrap');
  wrap.style.width  = (W * SCALE) + 'px';
  wrap.style.height = (H * SCALE) + 'px';
  tftCtx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  ovCtx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
}
resizeCanvases();

// ─── TFT Rendering Shim ────────────────────────────
const tft = {
  _cx: 0, _cy: 0, _sz: 1, _fg: '#FFA200', _bg: null,
  fillRect(x, y, w, h, c) {
    tftCtx.fillStyle = c;
    tftCtx.fillRect(x, y, w, h);
  },
  drawFastHLine(x, y, w, c) { this.fillRect(x, y, w, 1, c); },
  drawFastVLine(x, y, h, c) { this.fillRect(x, y, 1, h, c); },
  setCursor(x, y) { this._cx = x; this._cy = y; },
  setTextSize(s) { this._sz = s; },
  setTextColor(fg, bg) { this._fg = fg; this._bg = bg !== undefined ? bg : null; },
  print(text) {
    const s = this._sz;
    const cw = 6 * s, ch = 8 * s;
    const str = String(text);
    tftCtx.font = `bold ${ch}px "Courier New", monospace`;
    tftCtx.textBaseline = 'top';
    for (let i = 0; i < str.length; i++) {
      if (this._bg) {
        tftCtx.fillStyle = this._bg;
        tftCtx.fillRect(this._cx, this._cy, cw, ch);
      }
      tftCtx.fillStyle = this._fg;
      tftCtx.fillText(str[i], this._cx + 1, this._cy);
      this._cx += cw;
    }
  }
};

// ─── Data Model ─────────────────────────────────────
let elements = [];
let selectedId = null;
let undoStack = [];
let redoStack = [];
let snapToGrid = false;
let gridSize = 8;
let showScanlines = true;
let colorTarget = 'textColor'; // which color property the palette edits
let nextId = 1;

function makeId() { return 'el_' + (nextId++); }

function defaultElement(type) {
  const cx = Math.round(W / 2);
  const cy = Math.round(H / 2);
  const base = { id: makeId(), type, name: '', x: 0, y: 0, w: 60, h: 20, visible: true, locked: false };
  if (type === 'text') {
    base.text = 'TEXT';
    base.fontSize = 2;
    base.textColor = '#FFA200';
    base.bgColor = null;
    base.align = 'left';
    base.w = base.text.length * 6 * base.fontSize;
    base.h = 8 * base.fontSize;
    base.x = cx - Math.round(base.w / 2);
    base.y = cy - Math.round(base.h / 2);
    base.name = 'Text ' + base.id.split('_')[1];
  } else if (type === 'rect') {
    base.fillColor = '#392000';
    base.borderColor = '#FFA200';
    base.w = 100;
    base.h = 40;
    base.x = cx - 50;
    base.y = cy - 20;
    base.name = 'Rect ' + base.id.split('_')[1];
  } else if (type === 'line') {
    base.orientation = 'h';
    base.lineColor = '#392000';
    base.w = 100;
    base.h = 1;
    base.x = cx - 50;
    base.y = cy;
    base.name = 'Line ' + base.id.split('_')[1];
  }
  return base;
}

function findEl(id) { return elements.find(e => e.id === id); }

// ─── Undo / Redo ────────────────────────────────────
function pushUndo() {
  undoStack.push(JSON.stringify(elements));
  redoStack = [];
  if (undoStack.length > 50) undoStack.shift();
  autoSave();
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(elements));
  elements = JSON.parse(undoStack.pop());
  const el = findEl(selectedId);
  if (!el) selectedId = null;
  renderAll();
}

function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(elements));
  elements = JSON.parse(redoStack.pop());
  const el = findEl(selectedId);
  if (!el) selectedId = null;
  renderAll();
}

// ─── Rendering ──────────────────────────────────────
function renderTFT() {
  tft.fillRect(0, 0, W, H, '#080400');
  for (const el of elements) {
    if (!el.visible) continue;
    drawElement(el);
  }
}

function drawElement(el) {
  if (el.type === 'rect') {
    if (el.fillColor) tft.fillRect(el.x, el.y, el.w, el.h, el.fillColor);
    if (el.borderColor) {
      tft.drawFastHLine(el.x, el.y, el.w, el.borderColor);
      tft.drawFastHLine(el.x, el.y + el.h - 1, el.w, el.borderColor);
      tft.drawFastVLine(el.x, el.y, el.h, el.borderColor);
      tft.drawFastVLine(el.x + el.w - 1, el.y, el.h, el.borderColor);
    }
  } else if (el.type === 'line') {
    if (el.orientation === 'h') {
      tft.drawFastHLine(el.x, el.y, el.w, el.lineColor);
    } else {
      tft.drawFastVLine(el.x, el.y, el.h, el.lineColor);
    }
  } else if (el.type === 'text') {
    const s = el.fontSize;
    const cw = 6 * s, ch = 8 * s;
    const textW = el.text.length * cw;
    let tx = el.x;
    if (el.align === 'center') tx = el.x + Math.round((el.w - textW) / 2);
    else if (el.align === 'right') tx = el.x + el.w - textW;
    if (el.bgColor) tft.fillRect(el.x, el.y, el.w, el.h, el.bgColor);
    tft.setTextSize(s);
    tft.setTextColor(el.textColor);
    tft.setCursor(tx, el.y);
    tft.print(el.text);
  }
}

function renderOverlay() {
  ovCtx.clearRect(0, 0, W, H);

  // Grid
  if (snapToGrid) {
    ovCtx.lineWidth = 0.5;
    for (let x = 0; x < W; x += gridSize) {
      ovCtx.strokeStyle = (x % (gridSize * 4) === 0) ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.07)';
      ovCtx.beginPath();
      ovCtx.moveTo(x, 0);
      ovCtx.lineTo(x, H);
      ovCtx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ovCtx.strokeStyle = (y % (gridSize * 4) === 0) ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.07)';
      ovCtx.beginPath();
      ovCtx.moveTo(0, y);
      ovCtx.lineTo(W, y);
      ovCtx.stroke();
    }
  }

  // Smart snap guides (show alignment with other elements)
  if (selectedId && (isDragging || isResizing)) {
    const sel = elements.find(e => e.id === selectedId);
    if (sel) {
      const guides = [];
      const SNAP_THRESH = 3;
      const selCx = sel.x + sel.w / 2, selCy = sel.y + sel.h / 2;
      const selR = sel.x + sel.w, selB = sel.y + sel.h;
      for (const el of elements) {
        if (el.id === selectedId || !el.visible) continue;
        const elCx = el.x + el.w / 2, elCy = el.y + el.h / 2;
        const elR = el.x + el.w, elB = el.y + el.h;
        // Vertical guides (x-axis alignment)
        if (Math.abs(sel.x - el.x) <= SNAP_THRESH) guides.push({dir:'v', pos: el.x});
        if (Math.abs(selR - elR) <= SNAP_THRESH) guides.push({dir:'v', pos: elR});
        if (Math.abs(selCx - elCx) <= SNAP_THRESH) guides.push({dir:'v', pos: elCx});
        if (Math.abs(sel.x - elR) <= SNAP_THRESH) guides.push({dir:'v', pos: elR});
        if (Math.abs(selR - el.x) <= SNAP_THRESH) guides.push({dir:'v', pos: el.x});
        // Horizontal guides (y-axis alignment)
        if (Math.abs(sel.y - el.y) <= SNAP_THRESH) guides.push({dir:'h', pos: el.y});
        if (Math.abs(selB - elB) <= SNAP_THRESH) guides.push({dir:'h', pos: elB});
        if (Math.abs(selCy - elCy) <= SNAP_THRESH) guides.push({dir:'h', pos: elCy});
        if (Math.abs(sel.y - elB) <= SNAP_THRESH) guides.push({dir:'h', pos: elB});
        if (Math.abs(selB - el.y) <= SNAP_THRESH) guides.push({dir:'h', pos: el.y});
      }
      ovCtx.setLineDash([3, 3]);
      ovCtx.strokeStyle = '#3b82f6';
      ovCtx.lineWidth = 0.5;
      const drawn = new Set();
      for (const g of guides) {
        const key = g.dir + Math.round(g.pos);
        if (drawn.has(key)) continue;
        drawn.add(key);
        ovCtx.beginPath();
        if (g.dir === 'v') { ovCtx.moveTo(g.pos, 0); ovCtx.lineTo(g.pos, H); }
        else { ovCtx.moveTo(0, g.pos); ovCtx.lineTo(W, g.pos); }
        ovCtx.stroke();
      }
      ovCtx.setLineDash([]);
    }
  }

  // Selection
  if (selectedId) {
    const el = findEl(selectedId);
    if (el) {
      ovCtx.strokeStyle = '#FFA200';
      ovCtx.lineWidth = 1;
      ovCtx.setLineDash([3, 3]);
      ovCtx.strokeRect(el.x - 0.5, el.y - 0.5, el.w + 1, el.h + 1);
      ovCtx.setLineDash([]);

      // Resize handles
      if (!el.locked) {
        const handles = getHandles(el);
        for (const h of handles) {
          ovCtx.fillStyle = '#FFA200';
          ovCtx.fillRect(h.x - 3, h.y - 3, 6, 6);
          ovCtx.strokeStyle = '#080400';
          ovCtx.lineWidth = 0.5;
          ovCtx.strokeRect(h.x - 3, h.y - 3, 6, 6);
        }
      }
    }
  }
}

function renderAll() {
  renderTFT();
  renderOverlay();
  updateLayersPanel();
  updatePropsPanel();
  updateCanvasInfo();
}

// ─── Resize Handles ─────────────────────────────────
function getHandles(el) {
  const { x, y, w, h } = el;
  return [
    { id: 'nw', x: x,         y: y },
    { id: 'n',  x: x + w / 2, y: y },
    { id: 'ne', x: x + w,     y: y },
    { id: 'e',  x: x + w,     y: y + h / 2 },
    { id: 'se', x: x + w,     y: y + h },
    { id: 's',  x: x + w / 2, y: y + h },
    { id: 'sw', x: x,         y: y + h },
    { id: 'w',  x: x,         y: y + h / 2 },
  ];
}

function hitHandle(el, mx, my) {
  const handles = getHandles(el);
  const r = 5;
  for (const h of handles) {
    if (Math.abs(mx - h.x) <= r && Math.abs(my - h.y) <= r) return h.id;
  }
  return null;
}

function hitTest(mx, my) {
  for (let i = elements.length - 1; i >= 0; i--) {
    const el = elements[i];
    if (!el.visible || el.locked) continue;
    const pad = (el.type === 'line') ? 4 : 0;
    if (mx >= el.x - pad && mx <= el.x + el.w + pad &&
        my >= el.y - pad && my <= el.y + el.h + pad) {
      return el;
    }
  }
  return null;
}

// ─── Mouse Interaction ──────────────────────────────
let isDragging = false;
let isResizing = false;
let dragHandle = null;
let dragStartX = 0, dragStartY = 0;
let elemStartX = 0, elemStartY = 0, elemStartW = 0, elemStartH = 0;
let hasMoved = false;

function canvasCoords(e) {
  const rect = ovCanvas.getBoundingClientRect();
  return {
    x: Math.round((e.clientX - rect.left) * W / rect.width),
    y: Math.round((e.clientY - rect.top) * H / rect.height)
  };
}

function snap(val) {
  return snapToGrid ? Math.round(val / gridSize) * gridSize : val;
}

ovCanvas.addEventListener('mousedown', (e) => {
  const { x, y } = canvasCoords(e);
  hasMoved = false;

  // Check handles first
  if (selectedId) {
    const el = findEl(selectedId);
    if (el && !el.locked) {
      const handle = hitHandle(el, x, y);
      if (handle) {
        isResizing = true;
        dragHandle = handle;
        dragStartX = x;
        dragStartY = y;
        elemStartX = el.x;
        elemStartY = el.y;
        elemStartW = el.w;
        elemStartH = el.h;
        return;
      }
    }
  }

  // Hit test elements
  const hit = hitTest(x, y);
  if (hit) {
    selectedId = hit.id;
    isDragging = true;
    dragStartX = x;
    dragStartY = y;
    elemStartX = hit.x;
    elemStartY = hit.y;
    renderAll();
  } else {
    selectedId = null;
    renderAll();
  }
});

ovCanvas.addEventListener('mousemove', (e) => {
  const { x, y } = canvasCoords(e);
  updateCanvasInfo(x, y);

  if (isDragging && selectedId) {
    const el = findEl(selectedId);
    if (!el) return;
    const dx = x - dragStartX;
    const dy = y - dragStartY;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) hasMoved = true;
    el.x = snap(Math.max(0, Math.min(W - el.w, elemStartX + dx)));
    el.y = snap(Math.max(0, Math.min(H - el.h, elemStartY + dy)));
    // Snap to other element edges/centers
    const ETHRESH = snapToGrid ? gridSize / 2 : 3;
    const cx = el.x + el.w / 2, cy = el.y + el.h / 2;
    for (const other of elements) {
      if (other.id === el.id || !other.visible) continue;
      const ocx = other.x + other.w / 2, ocy = other.y + other.h / 2;
      const or = other.x + other.w, ob = other.y + other.h;
      // X snaps: left-left, right-right, center-center, left-right, right-left
      if (Math.abs(el.x - other.x) < ETHRESH) el.x = other.x;
      else if (Math.abs(el.x + el.w - or) < ETHRESH) el.x = or - el.w;
      else if (Math.abs(cx - ocx) < ETHRESH) el.x = Math.round(ocx - el.w / 2);
      else if (Math.abs(el.x - or) < ETHRESH) el.x = or;
      else if (Math.abs(el.x + el.w - other.x) < ETHRESH) el.x = other.x - el.w;
      // Y snaps: top-top, bottom-bottom, center-center, top-bottom, bottom-top
      if (Math.abs(el.y - other.y) < ETHRESH) el.y = other.y;
      else if (Math.abs(el.y + el.h - ob) < ETHRESH) el.y = ob - el.h;
      else if (Math.abs(cy - ocy) < ETHRESH) el.y = Math.round(ocy - el.h / 2);
      else if (Math.abs(el.y - ob) < ETHRESH) el.y = ob;
      else if (Math.abs(el.y + el.h - other.y) < ETHRESH) el.y = other.y - el.h;
    }
    renderTFT();
    renderOverlay();
  }

  if (isResizing && selectedId) {
    const el = findEl(selectedId);
    if (!el) return;
    hasMoved = true;
    const dx = x - dragStartX;
    const dy = y - dragStartY;
    const MIN = el.type === 'line' ? 1 : 4;

    if (dragHandle.includes('e')) {
      el.w = snap(Math.max(MIN, elemStartW + dx));
    }
    if (dragHandle.includes('w')) {
      const newW = snap(Math.max(MIN, elemStartW - dx));
      el.x = elemStartX + elemStartW - newW;
      el.w = newW;
    }
    if (dragHandle.includes('s')) {
      el.h = snap(Math.max(MIN, elemStartH + dy));
    }
    if (dragHandle.includes('n')) {
      const newH = snap(Math.max(MIN, elemStartH - dy));
      el.y = elemStartY + elemStartH - newH;
      el.h = newH;
    }
    // Clamp
    el.x = Math.max(0, el.x);
    el.y = Math.max(0, el.y);
    el.w = Math.min(el.w, W - el.x);
    el.h = Math.min(el.h, H - el.y);

    renderTFT();
    renderOverlay();
    updatePropsPanel();
  }

  // Cursor
  if (!isDragging && !isResizing && selectedId) {
    const el = findEl(selectedId);
    if (el && !el.locked) {
      const handle = hitHandle(el, x, y);
      if (handle) {
        const cursors = { nw: 'nw-resize', ne: 'ne-resize', sw: 'sw-resize', se: 'se-resize',
                          n: 'n-resize', s: 's-resize', e: 'e-resize', w: 'w-resize' };
        ovCanvas.style.cursor = cursors[handle];
        return;
      }
    }
  }
  if (!isDragging && !isResizing) {
    const hit = hitTest(x, y);
    ovCanvas.style.cursor = hit ? 'move' : 'crosshair';
  }
});

ovCanvas.addEventListener('mouseup', () => {
  if ((isDragging || isResizing) && hasMoved) pushUndo();
  isDragging = false;
  isResizing = false;
  dragHandle = null;
  renderAll();
});

ovCanvas.addEventListener('dblclick', (e) => {
  const { x, y } = canvasCoords(e);
  const hit = hitTest(x, y);
  if (hit && hit.type === 'text') {
    selectedId = hit.id;
    renderAll();
    startInlineEdit(hit);
  }
});

// ─── Inline Text Editing ────────────────────────────
let inlineInput = null;

function startInlineEdit(el) {
  if (inlineInput) endInlineEdit();
  const wrap = document.getElementById('screen-wrap');
  inlineInput = document.createElement('input');
  inlineInput.type = 'text';
  inlineInput.value = el.text;
  inlineInput.style.cssText = `
    position: absolute;
    left: ${el.x * SCALE}px;
    top: ${el.y * SCALE}px;
    width: ${Math.max(el.w * SCALE, 100)}px;
    height: ${el.h * SCALE + 4}px;
    background: rgba(255,255,255,0.95);
    color: #333;
    border: 2px solid #3b82f6;
    font-family: 'Courier New', monospace;
    font-size: ${el.fontSize * 8 * SCALE}px;
    font-weight: bold;
    padding: 0 2px;
    outline: none;
    z-index: 10;
  `;
  inlineInput._elId = el.id;
  wrap.appendChild(inlineInput);
  inlineInput.focus();
  inlineInput.select();
  inlineInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === 'Escape') {
      e.stopPropagation();
      endInlineEdit(e.key === 'Enter');
    }
  });
  inlineInput.addEventListener('blur', () => endInlineEdit(true));
}

function endInlineEdit(commit) {
  if (!inlineInput) return;
  if (commit) {
    const el = findEl(inlineInput._elId);
    if (el && inlineInput.value !== el.text) {
      el.text = inlineInput.value;
      el.w = Math.max(el.w, el.text.length * 6 * el.fontSize);
      pushUndo();
    }
  }
  inlineInput.remove();
  inlineInput = null;
  renderAll();
}

// ─── Keyboard Shortcuts ─────────────────────────────
document.addEventListener('keydown', (e) => {
  if (inlineInput) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedId) {
      elements = elements.filter(el => el.id !== selectedId);
      selectedId = null;
      pushUndo();
      renderAll();
    }
  }
  if (e.ctrlKey && e.key === 'd') {
    e.preventDefault();
    if (selectedId) {
      const el = findEl(selectedId);
      if (el) {
        const dup = JSON.parse(JSON.stringify(el));
        dup.id = makeId();
        dup.name = el.name + ' copy';
        dup.x = Math.min(el.x + 10, W - el.w);
        dup.y = Math.min(el.y + 10, H - el.h);
        elements.push(dup);
        selectedId = dup.id;
        pushUndo();
        renderAll();
      }
    }
  }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); doUndo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); doRedo(); }
  if (e.ctrlKey && e.shiftKey && e.key === 'Z') { e.preventDefault(); doRedo(); }

  // Arrow nudge
  const arrows = { ArrowLeft: [-1, 0], ArrowRight: [1, 0], ArrowUp: [0, -1], ArrowDown: [0, 1] };
  if (arrows[e.key] && selectedId) {
    e.preventDefault();
    const el = findEl(selectedId);
    if (el && !el.locked) {
      const mult = e.shiftKey ? 10 : 1;
      el.x = Math.max(0, Math.min(W - el.w, el.x + arrows[e.key][0] * mult));
      el.y = Math.max(0, Math.min(H - el.h, el.y + arrows[e.key][1] * mult));
      pushUndo();
      renderAll();
    }
  }

  // Quick add
  if (e.key === 't' || e.key === 'T') addElement('text');
  if (e.key === 'r' && !e.ctrlKey) addElement('rect');
  if (e.key === 'l' || e.key === 'L') addElement('line');
  if (e.key === 'g' || e.key === 'G') toggleGrid();
  if (e.key === 'Escape') { selectedId = null; renderAll(); }
});

// ─── Add Element ────────────────────────────────────
function addElement(type) {
  const el = defaultElement(type);
  elements.push(el);
  selectedId = el.id;
  pushUndo();
  renderAll();
}

// ─── Layers Panel ───────────────────────────────────
function updateLayersPanel() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  if (!elements.length) {
    list.innerHTML = '<div class="empty-msg">No elements yet</div>';
    return;
  }
  // Render in reverse so top element is first in list
  for (let i = elements.length - 1; i >= 0; i--) {
    const el = elements[i];
    const div = document.createElement('div');
    div.className = 'layer-item' + (el.id === selectedId ? ' selected' : '');
    div.draggable = true;
    div.dataset.idx = i;

    const typeIcons = { text: 'T', rect: '▪', line: '─' };
    div.innerHTML = `
      <span class="layer-type">${typeIcons[el.type]}</span>
      <span class="layer-name">${el.name || el.type}</span>
      <span class="layer-vis ${el.visible ? '' : 'hidden'}" data-id="${el.id}">${el.visible ? '◉' : '◎'}</span>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('layer-vis')) {
        el.visible = !el.visible;
        pushUndo();
        renderAll();
        return;
      }
      selectedId = el.id;
      renderAll();
    });

    // Drag reorder
    div.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', i.toString());
      div.style.opacity = '0.5';
    });
    div.addEventListener('dragend', () => { div.style.opacity = '1'; });
    div.addEventListener('dragover', (e) => {
      e.preventDefault();
      div.style.borderTop = '2px solid #3b82f6';
    });
    div.addEventListener('dragleave', () => { div.style.borderTop = ''; });
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.style.borderTop = '';
      const fromVisual = parseInt(e.dataTransfer.getData('text/plain'));
      const toVisual = parseInt(div.dataset.idx);
      // Convert visual indices (reversed) to array indices
      const fromIdx = fromVisual;
      const toIdx = toVisual;
      if (fromIdx === toIdx) return;
      const [moved] = elements.splice(fromIdx, 1);
      elements.splice(toIdx, 0, moved);
      pushUndo();
      renderAll();
    });

    list.appendChild(div);
  }
}

// ─── Properties Panel ───────────────────────────────
function updatePropsPanel() {
  const container = document.getElementById('props-content');
  if (!selectedId) {
    container.innerHTML = '<div class="empty-msg">Select an element<br>or add one from the toolbar</div>';
    return;
  }
  const el = findEl(selectedId);
  if (!el) {
    container.innerHTML = '';
    return;
  }

  let html = '';

  // Common properties
  html += `<div class="prop-section"><h3>Element</h3>
    <div class="prop-row">
      <label>Name</label>
      <input type="text" value="${esc(el.name)}" onchange="setProp('name', this.value)">
    </div>
    <div class="prop-row">
      <div class="half"><label>X</label><input type="number" value="${el.x}" min="0" max="${W}" onchange="setProp('x', +this.value)"></div>
      <div class="half"><label>Y</label><input type="number" value="${el.y}" min="0" max="${H}" onchange="setProp('y', +this.value)"></div>
    </div>
    <div class="prop-row">
      <div class="half"><label>W</label><input type="number" value="${el.w}" min="1" max="${W}" onchange="setProp('w', +this.value)"></div>
      <div class="half"><label>H</label><input type="number" value="${el.h}" min="1" max="${H}" onchange="setProp('h', +this.value)"></div>
    </div>
    <div class="prop-row">
      <label>Locked</label>
      <input type="checkbox" ${el.locked ? 'checked' : ''} onchange="setProp('locked', this.checked)">
    </div>
  </div>`;

  // Type-specific
  if (el.type === 'text') {
    html += `<div class="prop-section"><h3>Text</h3>
      <div class="prop-row">
        <label>Content</label>
        <input type="text" value="${esc(el.text)}" onchange="setTextContent(this.value)">
      </div>
      <div class="prop-row">
        <label>Size</label>
        <select onchange="setFontSize(+this.value)">
          ${[1,2,3,4,5,6].map(s => `<option value="${s}" ${el.fontSize===s?'selected':''}>${s} (${s*6}x${s*8}px)</option>`).join('')}
        </select>
      </div>
      <div class="prop-row">
        <label>Align</label>
        <div class="align-btns">
          <button class="align-btn ${el.align==='left'?'active':''}" onclick="setProp('align','left');renderAll()">L</button>
          <button class="align-btn ${el.align==='center'?'active':''}" onclick="setProp('align','center');renderAll()">C</button>
          <button class="align-btn ${el.align==='right'?'active':''}" onclick="setProp('align','right');renderAll()">R</button>
        </div>
      </div>
    </div>`;
  }

  if (el.type === 'rect') {
    html += `<div class="prop-section"><h3>Rectangle</h3>
      <div class="prop-row">
        <label>Fill</label>
        <input type="text" value="${el.fillColor || 'none'}" onchange="setProp('fillColor', this.value==='none'?null:this.value);renderAll()">
      </div>
      <div class="prop-row">
        <label>Border</label>
        <input type="text" value="${el.borderColor || 'none'}" onchange="setProp('borderColor', this.value==='none'?null:this.value);renderAll()">
      </div>
    </div>`;
  }

  if (el.type === 'line') {
    html += `<div class="prop-section"><h3>Line</h3>
      <div class="prop-row">
        <label>Dir</label>
        <div class="align-btns">
          <button class="align-btn ${el.orientation==='h'?'active':''}" onclick="setOrientation('h')">HORIZ</button>
          <button class="align-btn ${el.orientation==='v'?'active':''}" onclick="setOrientation('v')">VERT</button>
        </div>
      </div>
    </div>`;
  }

  // Color palette
  const targets = el.type === 'text' ? ['textColor', 'bgColor'] :
                  el.type === 'rect' ? ['fillColor', 'borderColor'] :
                  ['lineColor'];
  const targetLabels = { textColor: 'TEXT', bgColor: 'BG', fillColor: 'FILL', borderColor: 'BORDER', lineColor: 'COLOR' };

  html += `<div class="prop-section"><h3>Color</h3>
    <div class="color-target-btns">
      ${targets.map(t => `<button class="ct-btn ${colorTarget===t?'active':''}" onclick="colorTarget='${t}';renderAll()">${targetLabels[t]}</button>`).join('')}
    </div>
    <div id="palette">
      ${PALETTE.map(p => `<div class="swatch ${el[colorTarget]===p.hex?'active':''}" style="background:${p.hex}" title="${p.name}" onclick="applyColor('${p.hex}')"></div>`).join('')}
    </div>
    <div id="custom-color-row">
      <input type="color" value="${el[colorTarget] || '#FFA200'}" onchange="applyColor(this.value)">
      <input type="text" value="${el[colorTarget] || 'none'}" placeholder="#hex or none" onchange="applyColor(this.value==='none'?null:this.value)">
    </div>
  </div>`;

  container.innerHTML = html;
}

function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function setProp(key, val) {
  const el = findEl(selectedId);
  if (!el) return;
  el[key] = val;
  pushUndo();
  renderAll();
}

function setTextContent(val) {
  const el = findEl(selectedId);
  if (!el) return;
  el.text = val;
  const minW = val.length * 6 * el.fontSize;
  if (el.w < minW) el.w = minW;
  pushUndo();
  renderAll();
}

function setFontSize(s) {
  const el = findEl(selectedId);
  if (!el) return;
  el.fontSize = s;
  el.h = 8 * s;
  const minW = el.text.length * 6 * s;
  if (el.w < minW) el.w = minW;
  pushUndo();
  renderAll();
}

function setOrientation(dir) {
  const el = findEl(selectedId);
  if (!el) return;
  el.orientation = dir;
  if (dir === 'h') { el.h = 1; if (el.w < 10) el.w = 100; }
  else { el.w = 1; if (el.h < 10) el.h = 100; }
  pushUndo();
  renderAll();
}

function applyColor(hex) {
  const el = findEl(selectedId);
  if (!el) return;
  el[colorTarget] = hex;
  pushUndo();
  renderAll();
}

// ─── Canvas Info ────────────────────────────────────
function updateCanvasInfo(mx, my) {
  const info = document.getElementById('canvas-info');
  let text = `${W}x${H} @ ${SCALE}x`;
  if (mx !== undefined) text += ` | ${mx}, ${my}`;
  if (selectedId) {
    const el = findEl(selectedId);
    if (el) text += ` | ${el.name}: ${el.x},${el.y} ${el.w}x${el.h}`;
  }
  info.textContent = text;
}

// ─── Display Resolution ─────────────────────────────
function onPresetChange() {
  const sel = document.getElementById('tb-preset');
  const cwEl = document.getElementById('tb-cw');
  const chEl = document.getElementById('tb-ch');
  const cxEl = document.getElementById('tb-cx');

  if (sel.value === 'custom') {
    cwEl.style.display = chEl.style.display = cxEl.style.display = '';
    cwEl.value = W;
    chEl.value = H;
  } else {
    cwEl.style.display = chEl.style.display = cxEl.style.display = 'none';
    const [w, h] = sel.value.split(',').map(Number);
    setResolution(w, h);
  }
}

function onCustomRes() {
  const w = parseInt(document.getElementById('tb-cw').value) || 480;
  const h = parseInt(document.getElementById('tb-ch').value) || 320;
  setResolution(Math.max(32, Math.min(1024, w)), Math.max(32, Math.min(1024, h)));
}

function setResolution(w, h) {
  const oldW = W, oldH = H;
  W = w; H = h;
  resizeCanvases();
  const sx = W / oldW, sy = H / oldH;
  for (const el of elements) {
    el.x = Math.round(el.x * sx);
    el.y = Math.round(el.y * sy);
    el.w = Math.round(el.w * sx);
    el.h = Math.round(el.h * sy);
    el.x = Math.min(el.x, W - 1);
    el.y = Math.min(el.y, H - 1);
    el.w = Math.min(el.w, W - el.x);
    el.h = Math.min(el.h, H - el.y);
    if (el.type === 'text') {
      const scaled = el.fontSize * Math.min(sx, sy);
      el.fontSize = Math.max(1, Math.min(6, Math.round(scaled)));
    }
  }
  pushUndo();
  renderAll();
}

// ─── Export / Import ────────────────────────────────
function exportJSON() {
  const data = { width: W, height: H, elements: elements };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tft-layout-${W}x${H}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON() {
  document.getElementById('import-input').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.elements || !Array.isArray(data.elements)) throw new Error('Invalid layout file');
      if (data.width && data.height) setResolution(data.width, data.height);
      nextId = 1;
      elements = data.elements.map(e => ({ ...e, id: makeId() }));
      selectedId = null;
      undoStack = [];
      redoStack = [];
      pushUndo();
      renderAll();
    } catch (err) {
      alert('Failed to import: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function hexToRgb565(hex) {
  if (!hex) return '0x0000';
  hex = hex.replace('#', '');
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);
  const val = ((r & 0xF8) << 8) | ((g & 0xFC) << 3) | (b >> 3);
  return '0x' + val.toString(16).toUpperCase().padStart(4, '0');
}

function findPaletteName(hex) {
  if (!hex) return null;
  const h = hex.toUpperCase();
  for (const p of PALETTE) {
    if (p.hex.toUpperCase() === h) return 'C_' + p.name;
  }
  return null;
}

function colorCode(hex) {
  const name = findPaletteName(hex);
  return name || hexToRgb565(hex);
}

function exportCpp() {
  let code = `// Generated by TFT Designer (${W}x${H})\n`;
  code += `// ${new Date().toISOString().split('T')[0]}\n\n`;
  code += `void drawCustomLayout() {\n`;
  code += `  tft.fillRect(0, 0, ${W}, ${H}, ${colorCode('#080400')});\n\n`;

  for (const el of elements) {
    if (!el.visible) continue;
    code += `  // ${el.name}\n`;
    if (el.type === 'rect') {
      if (el.fillColor) code += `  tft.fillRect(${el.x}, ${el.y}, ${el.w}, ${el.h}, ${colorCode(el.fillColor)});\n`;
      if (el.borderColor) {
        code += `  tft.drawFastHLine(${el.x}, ${el.y}, ${el.w}, ${colorCode(el.borderColor)});\n`;
        code += `  tft.drawFastHLine(${el.x}, ${el.y + el.h - 1}, ${el.w}, ${colorCode(el.borderColor)});\n`;
        code += `  tft.drawFastVLine(${el.x}, ${el.y}, ${el.h}, ${colorCode(el.borderColor)});\n`;
        code += `  tft.drawFastVLine(${el.x + el.w - 1}, ${el.y}, ${el.h}, ${colorCode(el.borderColor)});\n`;
      }
    } else if (el.type === 'line') {
      if (el.orientation === 'h') code += `  tft.drawFastHLine(${el.x}, ${el.y}, ${el.w}, ${colorCode(el.lineColor)});\n`;
      else code += `  tft.drawFastVLine(${el.x}, ${el.y}, ${el.h}, ${colorCode(el.lineColor)});\n`;
    } else if (el.type === 'text') {
      if (el.bgColor) code += `  tft.fillRect(${el.x}, ${el.y}, ${el.w}, ${el.h}, ${colorCode(el.bgColor)});\n`;
      code += `  tft.setTextSize(${el.fontSize});\n`;
      code += `  tft.setTextColor(${colorCode(el.textColor)});\n`;
      let tx = el.x;
      const textW = el.text.length * 6 * el.fontSize;
      if (el.align === 'center') tx = el.x + Math.round((el.w - textW) / 2);
      else if (el.align === 'right') tx = el.x + el.w - textW;
      code += `  tft.setCursor(${tx}, ${el.y});\n`;
      code += `  tft.print("${el.text.replace(/"/g, '\\"')}");\n`;
    }
    code += `\n`;
  }

  code += `}\n`;

  const blob = new Blob([code], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tft-layout-${W}x${H}.cpp`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── localStorage Persistence ───────────────────────
const STORAGE_KEY = 'tft-designer';

function autoSave() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ width: W, height: H, elements, nextId }));
  } catch (e) {}
}

function autoLoad() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.elements || !data.elements.length) return false;
    W = data.width || 480;
    H = data.height || 320;
    nextId = data.nextId || 1;
    elements = data.elements;

    // Sync the preset dropdown
    const presetSel = document.getElementById('tb-preset');
    const presetVal = W + ',' + H;
    let found = false;
    for (const opt of presetSel.options) {
      if (opt.value === presetVal) { presetSel.value = presetVal; found = true; break; }
    }
    if (!found) {
      presetSel.value = 'custom';
      document.getElementById('tb-cw').value = W;
      document.getElementById('tb-ch').value = H;
      document.getElementById('tb-cw').style.display = '';
      document.getElementById('tb-ch').style.display = '';
      document.getElementById('tb-cx').style.display = '';
    }

    resizeCanvases();
    return true;
  } catch (e) { return false; }
}

// ─── Init ───────────────────────────────────────────
autoLoad();
renderAll();
