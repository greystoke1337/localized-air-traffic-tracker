<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TFT Preview — Overhead Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a08;
    color: #ffa200;
    font-family: 'Courier New', monospace;
    display: flex;
    gap: 32px;
    padding: 24px;
    min-height: 100vh;
    align-items: flex-start;
  }

  #screen-wrap {
    flex-shrink: 0;
    position: relative;
    border: 2px solid #3a2000;
    box-shadow: 0 0 30px rgba(255,162,0,0.15), inset 0 0 20px rgba(0,0,0,0.5);
    border-radius: 4px;
  }
  #screen-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.12) 3px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    border-radius: 4px;
  }
  canvas {
    display: block;
    width: 960px;
    height: 640px;
    image-rendering: pixelated;
  }

  #controls {
    flex: 1;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #controls h2 {
    font-size: 16px;
    color: #ffa200;
    border-bottom: 1px solid #3a2000;
    padding-bottom: 6px;
    margin-bottom: 4px;
  }
  .ctl-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctl-row label {
    width: 90px;
    font-size: 12px;
    color: #7b2800;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .ctl-row select, .ctl-row input[type=text] {
    flex: 1;
    background: #181008;
    color: #ffa200;
    border: 1px solid #3a2000;
    padding: 4px 6px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  .ctl-row input[type=range] {
    flex: 1;
    accent-color: #ffa200;
  }
  .ctl-row .val {
    width: 70px;
    text-align: right;
    font-size: 12px;
    color: #ffa200;
  }
  #info {
    margin-top: 12px;
    font-size: 11px;
    color: #7b2800;
    line-height: 1.6;
  }
  .scenario-btn {
    background: #181008;
    color: #ffa200;
    border: 1px solid #3a2000;
    padding: 4px 8px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    flex: 1;
  }
  .scenario-btn:hover { background: #3a2000; }
  .scenario-btn.active { background: #ffa200; color: #0a0a08; }
  .net-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .net-btn {
    background: #181008;
    color: #7b2800;
    border: 1px solid #3a2000;
    padding: 3px 6px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    cursor: pointer;
  }
  .net-btn.ok { color: #00FF00; border-color: #004400; }
  .net-btn.fail { color: #FF0000; border-color: #440000; }
  .net-btn.active-src { background: #3a2000; }
  #net-path {
    margin-top: 4px;
    padding: 4px 6px;
    background: #0d0800;
    border: 1px solid #3a2000;
    font-size: 10px;
    color: #7b2800;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>

<div id="screen-wrap">
  <canvas id="tft" width="480" height="320"></canvas>
</div>

<div id="controls">
  <h2>SCENARIOS</h2>
  <div class="ctl-row">
    <select id="ctl-scenario" style="flex:1; background:#181008; color:#ffa200; border:1px solid #3a2000; padding:4px 6px; font-family:'Courier New',monospace; font-size:13px;">
      <option value="custom">Custom (manual controls)</option>
      <option value="normal">Normal commercial flight</option>
      <option value="emergency-7700">Emergency 7700 (MAYDAY)</option>
      <option value="emergency-7600">Emergency 7600 (NORDO)</option>
      <option value="emergency-7500">Emergency 7500 (HIJACK)</option>
      <option value="missing-data">Missing data (no callsign/reg)</option>
      <option value="boundary-alt">Boundary altitude (500 ft)</option>
      <option value="max-values">Max values (extreme telemetry)</option>
      <option value="overhead">Directly overhead (close + low)</option>
      <option value="landing">Landing approach</option>
      <option value="clear-skies">Clear skies (0 flights)</option>
      <option value="weather-sunny">Weather: sunny day</option>
      <option value="weather-storm">Weather: stormy</option>
      <option value="weather-loading">Weather: loading...</option>
    </select>
  </div>

  <h2>NETWORK SIM</h2>
  <div class="net-row">
    <button class="net-btn ok active-src" id="net-proxy" onclick="setNetSrc('proxy')">PROXY OK</button>
    <button class="net-btn ok" id="net-direct" onclick="setNetSrc('direct')">DIRECT OK</button>
    <button class="net-btn" id="net-cache" onclick="setNetSrc('cache')">CACHE ONLY</button>
    <button class="net-btn fail" id="net-none" onclick="setNetSrc('none')">ALL DOWN</button>
  </div>
  <div id="net-path">PATH: proxy → OK (200) → 3.2 KB</div>

  <h2>SCREEN</h2>
  <div class="ctl-row">
    <label>Mode</label>
    <select id="ctl-screen">
      <option value="flight" selected>Flight</option>
      <option value="weather">Weather</option>
    </select>
  </div>

  <h2>FLIGHT DATA</h2>

  <div class="ctl-row">
    <label>Callsign</label>
    <input type="text" id="ctl-callsign" value="QFA1" maxlength="11">
  </div>
  <div class="ctl-row">
    <label>Registration</label>
    <input type="text" id="ctl-reg" value="VH-OQA" maxlength="11">
  </div>
  <div class="ctl-row">
    <label>Type</label>
    <select id="ctl-type">
      <option value="B738">B737-800</option>
      <option value="A320">A320</option>
      <option value="B789" selected>B787-9</option>
      <option value="A380">A380</option>
      <option value="B77W">B777-300ER</option>
      <option value="B748">B747-8</option>
      <option value="DH8D">Dash 8-400</option>
      <option value="C208">Cessna Caravan</option>
      <option value="ZZZZ">UNKNOWN</option>
    </select>
  </div>
  <div class="ctl-row">
    <label>Phase</label>
    <select id="ctl-phase">
      <option value="0">TAKEOFF</option>
      <option value="1">CLIMBING</option>
      <option value="2" selected>CRUISING</option>
      <option value="3">DESCEND</option>
      <option value="4">APPROACH</option>
      <option value="5">LANDING</option>
      <option value="6">OVERHEAD</option>
      <option value="7">UNKNOWN</option>
    </select>
  </div>
  <div class="ctl-row">
    <label>Squawk</label>
    <select id="ctl-squawk">
      <option value="1200" selected>1200 (Normal)</option>
      <option value="2100">2100 (VFR)</option>
      <option value="7700">7700 (MAYDAY)</option>
      <option value="7600">7600 (NORDO)</option>
      <option value="7500">7500 (HIJACK)</option>
    </select>
  </div>
  <div class="ctl-row">
    <label>Route</label>
    <select id="ctl-route">
      <option value="YSSY,YMML" selected>Sydney > Melbourne</option>
      <option value="YSSY,YPPH">Sydney > Perth</option>
      <option value="VVTS,NZCH">Ho Chi Minh > Christchurch</option>
      <option value="KJFK,EGLL">New York > London</option>
      <option value="WSSS,YSSY">Singapore > Sydney</option>
      <option value="YBBN,YSSY">Brisbane > Sydney</option>
      <option value="OMDB,YSSY">Dubai > Sydney</option>
      <option value="YSSY,">Sydney > ???</option>
      <option value=",">No route data</option>
    </select>
  </div>

  <h2>TELEMETRY</h2>

  <div class="ctl-row">
    <label>Altitude</label>
    <input type="range" id="ctl-alt" min="0" max="45000" step="500" value="35000">
    <span class="val" id="val-alt">FL350</span>
  </div>
  <div class="ctl-row">
    <label>Speed</label>
    <input type="range" id="ctl-speed" min="0" max="600" step="10" value="460">
    <span class="val" id="val-speed">460 KT</span>
  </div>
  <div class="ctl-row">
    <label>V/Rate</label>
    <input type="range" id="ctl-vs" min="-3000" max="3000" step="100" value="0">
    <span class="val" id="val-vs">0 FPM</span>
  </div>
  <div class="ctl-row">
    <label>Distance</label>
    <input type="range" id="ctl-dist" min="0.5" max="50" step="0.5" value="8.5">
    <span class="val" id="val-dist">8.5 KM</span>
  </div>

  <h2>DISPLAY</h2>

  <div class="ctl-row">
    <label>Flights</label>
    <input type="range" id="ctl-count" min="0" max="10" step="1" value="3">
    <span class="val" id="val-count">3</span>
  </div>
  <div class="ctl-row">
    <label>Flight #</label>
    <input type="range" id="ctl-index" min="1" max="10" step="1" value="1">
    <span class="val" id="val-index">1</span>
  </div>

  <h2>WEATHER DATA</h2>

  <div class="ctl-row">
    <label>Temperature</label>
    <input type="range" id="ctl-temp" min="-10" max="45" step="0.5" value="22.5">
    <span class="val" id="val-temp">22.5 C</span>
  </div>
  <div class="ctl-row">
    <label>Feels Like</label>
    <input type="range" id="ctl-feels" min="-15" max="50" step="0.5" value="21.0">
    <span class="val" id="val-feels">21.0 C</span>
  </div>
  <div class="ctl-row">
    <label>Condition</label>
    <select id="ctl-condition">
      <option value="CLEAR SKY" selected>CLEAR SKY</option>
      <option value="FEW CLOUDS">FEW CLOUDS</option>
      <option value="SCATTERED CLOUDS">SCATTERED CLOUDS</option>
      <option value="OVERCAST">OVERCAST</option>
      <option value="LIGHT RAIN">LIGHT RAIN</option>
      <option value="HEAVY RAIN">HEAVY RAIN</option>
      <option value="THUNDERSTORM">THUNDERSTORM</option>
      <option value="FOG">FOG</option>
      <option value="SNOW">SNOW</option>
    </select>
  </div>
  <div class="ctl-row">
    <label>Humidity</label>
    <input type="range" id="ctl-humidity" min="0" max="100" step="1" value="55">
    <span class="val" id="val-humidity">55%</span>
  </div>
  <div class="ctl-row">
    <label>Wind Speed</label>
    <input type="range" id="ctl-wind-speed" min="0" max="120" step="1" value="15">
    <span class="val" id="val-wind-speed">15 KM/H</span>
  </div>
  <div class="ctl-row">
    <label>Wind Dir</label>
    <select id="ctl-wind-dir">
      <option value="N">N</option>
      <option value="NE">NE</option>
      <option value="E">E</option>
      <option value="SE" selected>SE</option>
      <option value="S">S</option>
      <option value="SW">SW</option>
      <option value="W">W</option>
      <option value="NW">NW</option>
    </select>
  </div>
  <div class="ctl-row">
    <label>UV Index</label>
    <input type="range" id="ctl-uv" min="0" max="12" step="0.1" value="5.2">
    <span class="val" id="val-uv">5.2</span>
  </div>

  <div id="info">
    Canvas: 480x320 (2x scaled)<br>
    Layout: HDR 28 + NAV 36 + CONTENT 236 + FOOT 20<br>
    Dashboard: 75px tall, starts at Y=225
  </div>
</div>

<script>
const canvas = document.getElementById('tft');
const ctx = canvas.getContext('2d');

// ─── Layout constants (must match firmware) ────────────
const W = 480, H = 320;
const HDR_H = 28, NAV_H = 36, FOOT_H = 20;
const CONTENT_Y = HDR_H + NAV_H;   // 64
const NAV_Y = HDR_H;               // 28
const NAV_BTN_W = 70, NAV_BTN_H = NAV_H - 4;
const NAV_BTN_GAP = 4;
const CFG_BTN_X1 = W - NAV_BTN_W;                           // 410
const GEO_BTN_X1 = CFG_BTN_X1 - NAV_BTN_GAP - NAV_BTN_W;   // 336
const WX_BTN_X1  = GEO_BTN_X1 - NAV_BTN_GAP - NAV_BTN_W;   // 262

// ─── RGB565 → CSS hex ──────────────────────────────────
const C_BG     = '#080400';
const C_AMBER  = '#FFA200';
const C_DIM    = '#7B2800';
const C_DIMMER = '#392000';
const C_GREEN  = '#00FF00';
const C_RED    = '#FF0000';
const C_CYAN   = '#00FFFF';
const C_YELLOW = '#FFFF00';
const C_ORANGE = '#FF8D00';
const C_GOLD   = '#FFCE42';

// ─── TFT_eSPI canvas shim ─────────────────────────────
const tft = {
  _cx: 0, _cy: 0, _sz: 1, _fg: C_AMBER, _bg: null,

  fillRect(x, y, w, h, c) {
    ctx.fillStyle = c;
    ctx.fillRect(x, y, w, h);
  },
  drawFastHLine(x, y, w, c) { this.fillRect(x, y, w, 1, c); },
  drawFastVLine(x, y, h, c) { this.fillRect(x, y, 1, h, c); },
  setCursor(x, y) { this._cx = x; this._cy = y; },
  setTextSize(s)  { this._sz = s; },
  setTextColor(fg, bg) { this._fg = fg; this._bg = bg !== undefined ? bg : null; },
  print(text) {
    const s = this._sz;
    const cw = 6 * s, ch = 8 * s;
    const str = String(text);
    ctx.font = `bold ${ch}px "Courier New", monospace`;
    ctx.textBaseline = 'top';
    for (let i = 0; i < str.length; i++) {
      if (this._bg) {
        ctx.fillStyle = this._bg;
        ctx.fillRect(this._cx, this._cy, cw, ch);
      }
      ctx.fillStyle = this._fg;
      ctx.fillText(str[i], this._cx + 1, this._cy);
      this._cx += cw;
    }
  }
};

function getAirline(cs) {
  if (!cs) return null;
  const prefix = cs.substring(0, 3);
  return AIRLINES[prefix] || null;
}

function getAircraftTypeName(code) {
  if (!code) return '---';
  const entry = AIRCRAFT_TYPES[code];
  return entry ? entry[0] : code;
}

function getAircraftCategory(code) {
  if (!code) return null;
  const entry = AIRCRAFT_TYPES[code];
  return entry ? entry[1] : null;
}

function airportCity(code) {
  if (!code) return null;
  return AIRPORTS[code] || code;
}

function formatRoute(dep, arr) {
  if (!dep && !arr) return null;
  const d = dep ? (airportCity(dep) || '?') : '?';
  const a = arr ? (airportCity(arr) || '?') : '?';
  return d + ' > ' + a;
}

function formatAlt(alt) {
  if (alt <= 0) return '---';
  if (alt >= 10000) return 'FL' + String(Math.floor(alt / 100)).padStart(3, '0');
  return alt + ' FT';
}

const STATUS_LABELS = ['TAKEOFF','CLIMBING','CRUISING','DESCEND','APPROACH','LANDING','OVERHEAD','UNKNOWN'];
const STATUS_COLORS = [C_GREEN, C_CYAN, C_AMBER, C_ORANGE, C_GOLD, C_RED, C_YELLOW, C_DIM];

function statusLabel(s) { return STATUS_LABELS[s] || 'UNKNOWN'; }
function statusColor(s) { return STATUS_COLORS[s] || C_DIM; }

// ─── Rendering functions (with FIXED layout) ──────────

function drawHeader() {
  tft.fillRect(0, 0, W, HDR_H, C_AMBER);
  tft.setTextColor(C_BG, C_AMBER);
  tft.setTextSize(2);
  tft.setCursor(8, 6);
  tft.print('OVERHEAD TRACKER');
  const loc = 'SYDNEY';
  const locW = loc.length * 12;
  tft.setCursor(W - locW - 8, 6);
  tft.print(loc);
}

let currentScreenMode = 'flight';

function drawNavBar(flightIndex, flightCount) {
  tft.fillRect(0, NAV_Y, W, NAV_H, C_BG);
  tft.drawFastHLine(0, NAV_Y, W, C_DIMMER);

  // Flight index indicator
  if (currentScreenMode === 'flight' && flightCount > 1) {
    const navBuf = '< ' + (flightIndex + 1) + '/' + flightCount + ' >';
    tft.setTextSize(2);
    tft.setTextColor(C_DIM, C_BG);
    tft.setCursor(8, NAV_Y + 10);
    tft.print(navBuf);
  }

  // WX button (highlighted when on weather screen)
  const wxBg = currentScreenMode === 'weather' ? C_CYAN : C_DIMMER;
  const wxFg = currentScreenMode === 'weather' ? C_BG   : C_AMBER;
  tft.fillRect(WX_BTN_X1, NAV_Y + 2, NAV_BTN_W, NAV_BTN_H, wxBg);
  tft.setTextColor(wxFg, wxBg);
  tft.setTextSize(2);
  tft.setCursor(WX_BTN_X1 + (NAV_BTN_W - 24) / 2, NAV_Y + 10);
  tft.print('WX');

  // GEO button
  const geoLabel = '10KM';
  const geoW = geoLabel.length * 12;
  tft.fillRect(GEO_BTN_X1, NAV_Y + 2, NAV_BTN_W, NAV_BTN_H, C_DIMMER);
  tft.setTextColor(C_AMBER, C_DIMMER);
  tft.setCursor(GEO_BTN_X1 + (NAV_BTN_W - geoW) / 2, NAV_Y + 10);
  tft.print(geoLabel);

  // CFG button
  tft.fillRect(CFG_BTN_X1, NAV_Y + 2, NAV_BTN_W, NAV_BTN_H, C_DIMMER);
  tft.setTextColor(C_AMBER, C_DIMMER);
  const cfgLabel = 'CFG';
  const cfgW = cfgLabel.length * 12;
  tft.setCursor(CFG_BTN_X1 + (NAV_BTN_W - cfgW) / 2, NAV_Y + 10);
  tft.print(cfgLabel);
}

function drawStatusBar(flightIndex, flightCount) {
  const y = H - FOOT_H;
  tft.fillRect(0, y, W, FOOT_H, C_BG);
  tft.drawFastHLine(0, y, W, C_DIMMER);
  tft.setTextColor(C_DIM, C_BG);
  tft.setTextSize(1);
  const buf = '  AC ' + (flightIndex+1) + '/' + flightCount + '   SRC:PROXY   NEXT:15s';
  tft.setCursor(6, y + 6);
  tft.print(buf);
}

function renderFlight(f, flightIndex, flightCount) {
  // Clear everything
  tft.fillRect(0, 0, W, H, C_BG);

  drawHeader();
  drawNavBar(flightIndex, flightCount);

  // Clear content area
  tft.fillRect(0, CONTENT_Y, W, H - HDR_H - NAV_H - FOOT_H, C_BG);

  // Emergency squawk banner
  const hasEmergency = f.squawk === '7700' || f.squawk === '7600' || f.squawk === '7500';
  let emergOffset = 0;
  if (hasEmergency) {
    const emergLabel = f.squawk === '7700' ? 'EMERGENCY - MAYDAY' :
                       f.squawk === '7600' ? 'EMERGENCY - NORDO'  :
                                              'EMERGENCY - HIJACK';
    tft.fillRect(0, CONTENT_Y, W, 24, C_RED);
    tft.setTextColor(C_BG, C_RED);
    tft.setTextSize(2);
    const lblW = emergLabel.length * 12;
    tft.setCursor(Math.floor((W - lblW) / 2), CONTENT_Y + 4);
    tft.print(emergLabel);
    emergOffset = 24;
  }

  const x = 15;
  let y = CONTENT_Y + emergOffset + 4;    // FIXED: was +6

  // 1. CALLSIGN (adaptive size for emergency)
  const csSize = hasEmergency ? 3 : 4;    // FIXED: smaller in emergency
  tft.setTextSize(csSize);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(x, y);
  tft.print(f.callsign || 'SEARCHING');

  y += csSize * 8;                         // FIXED: dynamic advance

  // AIRLINE (skip in emergency mode)
  if (!hasEmergency) {
    const al = getAirline(f.callsign);
    tft.setTextSize(2);
    tft.setTextColor(al ? al.color : C_DIM, C_BG);
    tft.setCursor(x, y);
    tft.print(al ? al.name : 'UNKNOWN AIRLINE');
    y += 20;                               // FIXED: was 30
  } else {
    y += 8;
  }

  // 2. AIRCRAFT TYPE & REG
  tft.drawFastHLine(10, y, W - 20, C_DIMMER);
  y += 8;                                  // FIXED: was 10

  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(x, y);
  tft.print(getAircraftCategory(f.type) || 'AIRCRAFT TYPE');
  tft.setCursor(W/2 + 20, y);
  tft.print('REGISTRATION');

  y += 10;
  tft.setTextSize(2);
  tft.setTextColor(C_CYAN, C_BG);
  tft.setCursor(x, y);
  tft.print(getAircraftTypeName(f.type));

  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(W/2 + 20, y);
  tft.print(f.reg || '---');

  // 3. ROUTE SECTION
  y += 20;                                 // FIXED: was 28
  tft.drawFastHLine(10, y, W - 20, C_DIMMER);
  y += 8;                                  // FIXED: was 10

  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(x, y);
  tft.print('ROUTE');

  y += 10;
  const route = f.route || null;
  if (route) {
    tft.setTextSize(2);                    // FIXED: always size 2
    tft.setTextColor(C_YELLOW, C_BG);
    tft.setCursor(x, y);
    tft.print(route);
  } else {
    tft.setTextSize(2);                    // FIXED: was 3
    tft.setTextColor(C_DIMMER, C_BG);
    tft.setCursor(x, y);
    tft.print('NO ROUTE DATA');
  }

  // 4. DASHBOARD (75px tall — FIXED: was 85px)
  const dashY = H - FOOT_H - 75;          // FIXED: 225 (was 215)
  tft.drawFastHLine(0, dashY, W, C_DIM);

  // Phase Block (0-120)
  const sCol = statusColor(f.status);
  tft.fillRect(0, dashY + 1, 4, 74, sCol);           // FIXED: was 84
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(12, dashY + 8);                       // FIXED: was +10
  tft.print('PHASE');
  tft.setTextSize(2);
  tft.setTextColor(sCol, C_BG);
  tft.setCursor(12, dashY + 24);                      // FIXED: was +28
  tft.print(statusLabel(f.status));

  // Squawk (below phase)
  const emerg = f.squawk === '7700' || f.squawk === '7600' || f.squawk === '7500';
  const sqLabel = f.squawk === '7700' ? 'MAYDAY' : f.squawk === '7600' ? 'NORDO' : f.squawk === '7500' ? 'HIJACK' : f.squawk;
  tft.setTextColor(emerg ? C_RED : C_DIM, C_BG);
  tft.setTextSize(1);
  tft.setCursor(12, dashY + 44);                      // FIXED: was +52
  tft.print('SQK ' + sqLabel);

  // Altitude Block (120-240)
  const altBuf = formatAlt(f.alt);
  tft.drawFastVLine(120, dashY + 5, 65, C_DIMMER);   // FIXED: was 75
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(132, dashY + 8);                      // FIXED: was +10
  tft.print('ALTITUDE');
  tft.setTextSize(2);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(132, dashY + 24);                     // FIXED: was +30
  tft.print(altBuf);

  // Vertical rate
  tft.setTextSize(1);
  if (Math.abs(f.vs) >= 50) {
    let vsBuf;
    if (f.vs > 0) {
      vsBuf = '+' + f.vs + ' FPM';
      tft.setTextColor(C_GREEN, C_BG);
    } else {
      vsBuf = f.vs + ' FPM';
      tft.setTextColor(C_RED, C_BG);
    }
    tft.setCursor(132, dashY + 44);                   // FIXED: was +52
    tft.print(vsBuf);
  } else {
    tft.setTextColor(C_AMBER, C_BG);
    tft.setCursor(132, dashY + 44);                   // FIXED: was +52
    tft.print('LEVEL');
  }

  // Speed Block (240-360)
  tft.drawFastVLine(240, dashY + 5, 65, C_DIMMER);   // FIXED: was 75
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(252, dashY + 8);                      // FIXED: was +10
  tft.print('SPEED');
  tft.setTextSize(2);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(252, dashY + 24);                     // FIXED: was +30
  if (f.speed > 0) {
    tft.print(String(f.speed));
    tft.setTextSize(1);
    tft.print(' KT');
  } else {
    tft.print('---');
  }

  // Distance Block (360-480)
  tft.drawFastVLine(360, dashY + 5, 65, C_DIMMER);   // FIXED: was 75
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(372, dashY + 8);                      // FIXED: was +10
  tft.print('DISTANCE');
  tft.setTextSize(2);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(372, dashY + 24);                     // FIXED: was +30
  if (f.dist > 0) {
    const distStr = f.dist >= 10 ? f.dist.toFixed(0) : f.dist.toFixed(1);
    tft.print(distStr);
    tft.setTextSize(1);
    tft.print(' KM');
  } else {
    tft.print('---');
  }

  drawStatusBar(flightIndex, flightCount);

  // Debug: draw layout guide lines (subtle)
  // Uncomment to see zone boundaries:
  // ctx.strokeStyle = 'rgba(255,0,0,0.3)';
  // ctx.strokeRect(0, dashY, W, 75);
}

function renderWeather(wx) {
  tft.fillRect(0, 0, W, H, C_BG);
  drawHeader();
  drawNavBar(0, 0);
  tft.fillRect(0, CONTENT_Y, W, H - HDR_H - NAV_H - FOOT_H, C_BG);

  // Clock
  let cy = CONTENT_Y + 12;
  const now = new Date();
  const timeBuf = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  tft.setTextSize(6);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(Math.floor((W - 180) / 2), cy);
  tft.print(timeBuf);

  cy += 52;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const mons = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dateBuf = days[now.getDay()] + ' ' + now.getDate() + ' ' + mons[now.getMonth()];
  const dateW = dateBuf.length * 12;
  tft.setTextSize(2);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(Math.floor((W - dateW) / 2), cy);
  tft.print(dateBuf);
  cy += 22;

  tft.drawFastHLine(10, cy, W - 20, C_DIMMER);
  cy += 8;

  if (!wx.ready) {
    tft.setTextSize(1);
    tft.setTextColor(C_DIMMER, C_BG);
    tft.setCursor(15, cy);
    tft.print('WEATHER LOADING...');
    drawStatusBar(0, 0);
    return;
  }

  // Row 1: Temperature | Feels Like
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(15, cy);       tft.print('TEMPERATURE');
  tft.setCursor(W/2 + 15, cy); tft.print('FEELS LIKE');
  cy += 10;
  tft.setTextSize(2);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(15, cy);       tft.print(wx.temp.toFixed(1) + ' C');
  tft.setCursor(W/2 + 15, cy); tft.print(wx.feels_like.toFixed(1) + ' C');
  cy += 20;

  tft.drawFastHLine(10, cy, W - 20, C_DIMMER); cy += 6;

  // Row 2: Condition
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(15, cy); tft.print('CONDITIONS');
  cy += 10;
  tft.setTextSize(2);
  tft.setTextColor(C_YELLOW, C_BG);
  tft.setCursor(15, cy); tft.print(wx.condition);
  cy += 20;

  tft.drawFastHLine(10, cy, W - 20, C_DIMMER); cy += 6;

  // Row 3: Humidity | Wind
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(15, cy);       tft.print('HUMIDITY');
  tft.setCursor(W/2 + 15, cy); tft.print('WIND');
  cy += 10;
  tft.setTextSize(2);
  tft.setTextColor(C_AMBER, C_BG);
  tft.setCursor(15, cy);       tft.print(wx.humidity + '%');
  tft.setCursor(W/2 + 15, cy); tft.print(wx.wind_speed + ' KM/H ' + wx.wind_cardinal);
  cy += 20;

  tft.drawFastHLine(10, cy, W - 20, C_DIMMER); cy += 6;

  // Row 4: UV Index
  tft.setTextSize(1);
  tft.setTextColor(C_DIM, C_BG);
  tft.setCursor(15, cy); tft.print('UV INDEX');
  cy += 10;
  const uvCol = wx.uv_index < 3.0 ? C_GREEN :
                wx.uv_index < 6.0 ? C_YELLOW :
                wx.uv_index < 8.0 ? C_AMBER  : C_RED;
  tft.setTextSize(2);
  tft.setTextColor(uvCol, C_BG);
  tft.setCursor(15, cy); tft.print(wx.uv_index.toFixed(1));

  drawStatusBar(0, 0);
}

// ─── Controls wiring ───────────────────────────────────

function readControls() {
  const routeParts = document.getElementById('ctl-route').value.split(',');
  const alt = parseInt(document.getElementById('ctl-alt').value);
  const speed = parseInt(document.getElementById('ctl-speed').value);
  const vs = parseInt(document.getElementById('ctl-vs').value);
  const dist = parseFloat(document.getElementById('ctl-dist').value);

  // Update flight value labels
  document.getElementById('val-alt').textContent = formatAlt(alt);
  document.getElementById('val-speed').textContent = speed + ' KT';
  document.getElementById('val-vs').textContent = (vs > 0 ? '+' : '') + vs + ' FPM';
  document.getElementById('val-dist').textContent = dist.toFixed(1) + ' KM';
  document.getElementById('val-count').textContent = document.getElementById('ctl-count').value;
  document.getElementById('val-index').textContent = document.getElementById('ctl-index').value;

  // Update weather value labels
  document.getElementById('val-temp').textContent = parseFloat(document.getElementById('ctl-temp').value).toFixed(1) + ' C';
  document.getElementById('val-feels').textContent = parseFloat(document.getElementById('ctl-feels').value).toFixed(1) + ' C';
  document.getElementById('val-humidity').textContent = document.getElementById('ctl-humidity').value + '%';
  document.getElementById('val-wind-speed').textContent = document.getElementById('ctl-wind-speed').value + ' KM/H';
  document.getElementById('val-uv').textContent = parseFloat(document.getElementById('ctl-uv').value).toFixed(1);

  return {
    callsign: document.getElementById('ctl-callsign').value.toUpperCase(),
    reg: document.getElementById('ctl-reg').value.toUpperCase(),
    type: document.getElementById('ctl-type').value,
    status: parseInt(document.getElementById('ctl-phase').value),
    squawk: document.getElementById('ctl-squawk').value,
    route: formatRoute(routeParts[0] || '', routeParts[1] || '') || '',
    alt: alt,
    speed: speed,
    vs: vs,
    dist: dist,
    track: 180
  };
}

function readWeatherControls() {
  return {
    ready: true,
    temp: parseFloat(document.getElementById('ctl-temp').value),
    feels_like: parseFloat(document.getElementById('ctl-feels').value),
    condition: document.getElementById('ctl-condition').value,
    humidity: parseInt(document.getElementById('ctl-humidity').value),
    wind_speed: parseInt(document.getElementById('ctl-wind-speed').value),
    wind_cardinal: document.getElementById('ctl-wind-dir').value,
    uv_index: parseFloat(document.getElementById('ctl-uv').value)
  };
}

function render() {
  currentScreenMode = document.getElementById('ctl-screen').value;
  const count = parseInt(document.getElementById('ctl-count').value);

  if (currentScreenMode === 'weather') {
    const wx = readWeatherControls();
    renderWeather(wx);
  } else if (count === 0) {
    readControls();
    renderClearSkies();
  } else {
    const f = readControls();
    const index = parseInt(document.getElementById('ctl-index').value) - 1;
    renderFlight(f, index, count);
  }
}

    screen: 'weather',
    wx: { ready: false }
  }

function applyScenario(name) {
  const s = SCENARIOS[name];
  if (!s) return;

  if (s.screen === 'weather') {
    document.getElementById('ctl-screen').value = 'weather';
    if (s.wx && !s.wx.ready && s.wx.ready !== undefined) {
      // weather-loading: just render with ready=false
      currentScreenMode = 'weather';
      renderWeather({ ready: false });
      return;
    }
    if (s.wx) {
      document.getElementById('ctl-temp').value = s.wx.temp;
      document.getElementById('ctl-feels').value = s.wx.feels_like;
      document.getElementById('ctl-condition').value = s.wx.condition;
      document.getElementById('ctl-humidity').value = s.wx.humidity;
      document.getElementById('ctl-wind-speed').value = s.wx.wind_speed;
      document.getElementById('ctl-wind-dir').value = s.wx.wind_dir;
      document.getElementById('ctl-uv').value = s.wx.uv;
    }
  } else {
    document.getElementById('ctl-screen').value = s.screen || 'flight';
    document.getElementById('ctl-callsign').value = s.callsign;
    document.getElementById('ctl-reg').value = s.reg;
    document.getElementById('ctl-type').value = s.type;
    document.getElementById('ctl-phase').value = s.phase;
    document.getElementById('ctl-squawk').value = s.squawk;
    document.getElementById('ctl-route').value = s.route;
    document.getElementById('ctl-alt').value = s.alt;
    document.getElementById('ctl-speed').value = s.speed;
    document.getElementById('ctl-vs').value = s.vs;
    document.getElementById('ctl-dist').value = s.dist;
    document.getElementById('ctl-count').value = s.count;
    document.getElementById('ctl-index').value = s.index;
  }
  render();
}

document.getElementById('ctl-scenario').addEventListener('change', function() {
  if (this.value !== 'custom') applyScenario(this.value);
});

// ─── Network simulation ──────────────────────────────
let currentNetSrc = 'proxy';

function setNetSrc(src) {
  currentNetSrc = src;
  document.querySelectorAll('.net-btn').forEach(b => b.classList.remove('active-src'));
  document.getElementById('net-' + src).classList.add('active-src');

  const pathEl = document.getElementById('net-path');
  const srcMap = {
    'proxy':  'PATH: proxy → OK (200) → 3.2 KB',
    'direct': 'PATH: proxy → FAIL → direct API → OK (200) → 12.8 KB',
    'cache':  'PATH: proxy → FAIL → direct → FAIL → SD cache → OK',
    'none':   'PATH: proxy → FAIL → direct → FAIL → cache → EMPTY → NO DATA'
  };
  pathEl.textContent = srcMap[src] || '';

  // Update status bar source label
  render();
}

// ─── Override drawStatusBar to reflect network sim ────
const _origDrawStatusBar = drawStatusBar;
drawStatusBar = function(flightIndex, flightCount) {
  const y = H - FOOT_H;
  tft.fillRect(0, y, W, FOOT_H, C_BG);
  tft.drawFastHLine(0, y, W, C_DIMMER);
  tft.setTextColor(C_DIM, C_BG);
  tft.setTextSize(1);
  const srcLabels = { proxy: 'PROXY', direct: 'DIRECT', cache: 'CACHE', none: 'NONE' };
  const src = srcLabels[currentNetSrc] || 'PROXY';
  if (currentNetSrc === 'none') {
    tft.setCursor(6, y + 6);
    tft.print('  NO DATA — ALL SOURCES FAILED');
  } else {
    const buf = '  AC ' + (flightIndex+1) + '/' + flightCount + '   SRC:' + src + '   NEXT:15s   H:142000';
    tft.setCursor(6, y + 6);
    tft.print(buf);
  }
};

// Attach listeners
document.querySelectorAll('#controls select, #controls input').forEach(el => {
  el.addEventListener('change', function() {
    if (this.id === 'ctl-scenario') return;
    document.getElementById('ctl-scenario').value = 'custom';
    render();
  });
  el.addEventListener('input', function() {
    if (this.id === 'ctl-scenario') return;
    document.getElementById('ctl-scenario').value = 'custom';
    render();
  });
});

// Initial render
render();
</script>
